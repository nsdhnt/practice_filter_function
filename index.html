<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>絞り込み機能</title>
</head>
<body>
  <header>
    <h1>ポケモンずかん</h1>
  </header>
  <main>
    <div class="searchWindow">
      <div class="windowTitle">
        <h2>タイプや条件で探す</h2>
        <p><img src="" alt=""></p>
      </div>
      <div class="searchContent">
        <section>
          <h3>フリーワード</h3>
          <input type="search" placeholder="名前で検索する">
        </section>
        <section>
          <h3>タイプ</h3>
          <div>
            <button>ノーマル</button>
            <button>くさ</button>
            <button>ほのお</button>
            <button>みず</button>
            <button>でんき</button>
            <button>むし</button>
            <button>ひこう</button>
            <button>いわ</button>
            <button>どく</button>
            <button>じめん</button>
            <button>こおり</button>
            <button>かくとう</button>
            <button>エスパー</button>
            <button>ゴースト</button>
            <button>ドラゴン</button>
            <button>あく</button>
            <button>はがね</button>
            <button>フェアリー</button>
          </div>
        </section>
        <section>
          <h3>地方</h3>
            <button>カントー地方</button>
            <button>ジョウト地方</button>
            <button>ホウエン地方</button>
            <button>シンオウ地方</button>
            <button>イッシュ地方</button>
            <button>カロス地方</button>
            <button>アローラ地方</button>
            <button>ガラル地方</button>
            <button>ヒスイ地方</button>
            <button>パルデア地方</button>
            <button>未確認</button>
        </section>
        <section>
          <h3>番号</h3>
          <div class="number">
            <p>1</p>
            <p>〜</p>
            <p>1025</p>
          </div>
          <input type="range">
        </section>
      </div>
      <div class="searchBtn">
        <button>検索する</button>
        <button>条件をリセット</button>
      </div>
    </div>
  </main>
</body>
</html>
